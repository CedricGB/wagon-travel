<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Rail track -->
  <rect x="18" y="158" width="164" height="6" rx="3" fill="#D0D0D0"/>
  <!-- Rail ties -->
  <rect x="26" y="153" width="11" height="14" rx="2" fill="#B8B8B8"/>
  <rect x="50" y="153" width="11" height="14" rx="2" fill="#B8B8B8"/>
  <rect x="74" y="153" width="11" height="14" rx="2" fill="#B8B8B8"/>
  <rect x="98" y="153" width="11" height="14" rx="2" fill="#B8B8B8"/>
  <rect x="122" y="153" width="11" height="14" rx="2" fill="#B8B8B8"/>
  <rect x="146" y="153" width="11" height="14" rx="2" fill="#B8B8B8"/>
  <rect x="163" y="153" width="11" height="14" rx="2" fill="#B8B8B8"/>

  <!-- Wagon body -->
  <rect x="28" y="92" width="144" height="62" rx="12" fill="#F97316"/>
  <!-- Wagon body mid stripe -->
  <rect x="28" y="116" width="144" height="18" fill="#EA6A0A"/>
  <!-- Window 1 -->
  <rect x="42" y="100" width="32" height="26" rx="5" fill="white" opacity="0.93"/>
  <!-- Window 2 -->
  <rect x="84" y="100" width="32" height="26" rx="5" fill="white" opacity="0.93"/>
  <!-- Window 3 -->
  <rect x="126" y="100" width="32" height="26" rx="5" fill="white" opacity="0.93"/>
  <!-- Reflections -->
  <rect x="46" y="104" width="9" height="4" rx="2" fill="#F97316" opacity="0.4"/>
  <rect x="88" y="104" width="9" height="4" rx="2" fill="#F97316" opacity="0.4"/>
  <rect x="130" y="104" width="9" height="4" rx="2" fill="#F97316" opacity="0.4"/>
  <!-- Center door line -->
  <line x1="100" y1="116" x2="100" y2="154" stroke="#EA6A0A" stroke-width="2.5"/>

  <!-- Roof -->
  <rect x="22" y="82" width="156" height="16" rx="8" fill="#4A4A4A"/>
  <rect x="30" y="85" width="140" height="5" rx="2.5" fill="#6A6A6A" opacity="0.5"/>

  <!-- Wheels -->
  <!-- Left wheel -->
  <circle cx="68" cy="158" r="20" fill="#333333"/>
  <circle cx="68" cy="158" r="13" fill="#555555"/>
  <circle cx="68" cy="158" r="5.5" fill="#F97316"/>
  <line x1="68" y1="138" x2="68" y2="178" stroke="#777" stroke-width="2.5"/>
  <line x1="48" y1="158" x2="88" y2="158" stroke="#777" stroke-width="2.5"/>
  <line x1="54.1" y1="144.1" x2="81.9" y2="171.9" stroke="#777" stroke-width="2.5"/>
  <line x1="81.9" y1="144.1" x2="54.1" y2="171.9" stroke="#777" stroke-width="2.5"/>

  <!-- Right wheel -->
  <circle cx="132" cy="158" r="20" fill="#333333"/>
  <circle cx="132" cy="158" r="13" fill="#555555"/>
  <circle cx="132" cy="158" r="5.5" fill="#F97316"/>
  <line x1="132" y1="138" x2="132" y2="178" stroke="#777" stroke-width="2.5"/>
  <line x1="112" y1="158" x2="152" y2="158" stroke="#777" stroke-width="2.5"/>
  <line x1="118.1" y1="144.1" x2="145.9" y2="171.9" stroke="#777" stroke-width="2.5"/>
  <line x1="145.9" y1="144.1" x2="118.1" y2="171.9" stroke="#777" stroke-width="2.5"/>

  <!-- Destination pin -->
  <!-- Pin shadow -->
  <ellipse cx="100" cy="76" rx="10" ry="3" fill="#00000015"/>
  <!-- Pin body -->
  <circle cx="100" cy="50" r="20" fill="#F97316"/>
  <circle cx="100" cy="50" r="10" fill="white"/>
  <!-- Pin tail -->
  <polygon points="92,64 108,64 100,80" fill="#F97316"/>
